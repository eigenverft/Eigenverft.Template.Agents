interface:
  display_name: "Work on Handoff Files"
  short_description: "Plan and implement AGENTS/HANDOFF work"
  default_prompt: "Use $work-on-handoff-files-softskill to consume the selected AGENTS/HANDOFF files as an ordered implementation queue. Revalidate each handoff against current source and earlier completed work, detect overlapping or already implemented scope, reduce the plan to the remaining delta, use the harness plan function when available, make ordinary technical decisions yourself, implement and verify one handoff at a time, preserve the handoff files, and do not commit or push unless explicitly requested."
