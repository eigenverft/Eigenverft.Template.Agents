interface:
  display_name: "Work on Handoff Files"
  short_description: "Plan and implement AGENTS/HANDOFF work"
  default_prompt: "Use $work-on-handoff-files-softskill as the executing agent for the complete selected top-level AGENTS/HANDOFF queue. Do not delegate the loop and do not pause for confirmation after partial progress. Follow files marked `Status: superseded` to their canonical destinations. Revalidate each actionable handoff against current source and earlier completed work, reduce the plan to the remaining delta, decide whether each optional recommendation should be implemented, rejected, or deferred, use the harness plan function when available, implement and verify one handoff at a time, and move each completed file into AGENTS/HANDOFF/DONE/ with its original filename. Continue until every selected file is in DONE/. Return early only when an unavoidable required-work blocker prevents all remaining selected work from proceeding safely. Do not commit or push unless explicitly requested."
