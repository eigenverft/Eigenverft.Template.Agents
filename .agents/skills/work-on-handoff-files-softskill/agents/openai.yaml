interface:
  display_name: "Work on Handoff Files"
  short_description: "Plan and implement AGENTS/HANDOFF work"
  default_prompt: "Use $work-on-handoff-files-softskill to consume the selected top-level AGENTS/HANDOFF files as an ordered implementation queue. Follow files marked `Status: superseded` to their canonical destinations. Revalidate each actionable handoff against current source and earlier completed work, reduce the plan to the remaining delta, decide which optional recommendations to implement or reject, use the harness plan function when available, implement and verify one handoff at a time, then move each fully completed handoff into AGENTS/HANDOFF/DONE/ with its original filename. Leave blocked or unfinished handoffs active, and do not commit or push unless explicitly requested."
