interface:
  display_name: "Concept Model Review"
  short_description: "Source-first guidance for finding weak concepts, flawed models, and better alternatives."
  default_prompt: "Use $concept-model-review-softskill to review the source and identify weak concepts, costly underlying models, and implementation ideas that create unnecessary complexity. Group the main concept-level pain points, highlight the highest-pain cluster, judge whether the idea itself makes sense, suggest realistic alternatives, and turn the findings into concrete improvement tasks without drifting into vague architecture talk."