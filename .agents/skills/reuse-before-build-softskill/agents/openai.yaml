interface:
  display_name: "Reuse Before Build"
  short_description: "Find only reuse changes worth making now"
  default_prompt: "Use $reuse-before-build-softskill as a technology-independent, source-first review. Inspect the repository for custom mechanisms that should be replaced or materially reduced now by an existing repository mechanism, standard-library or platform API, framework feature, current dependency, or established ecosystem solution. A finding is eligible only when the change is compatible with current constraints, has a concrete present-day correctness, maintenance, security, or complexity benefit, and is worth opening an implementation issue or pull request for now. Merely naming an alternative, confirming that existing code is proportionate, suggesting optional modernization, or describing a future possibility is not a finding. Return only high- or medium-confidence current-state actionable recommendations. Do not report keep-as-is results, no-action inventories, rejected-package catalogs, or general review summaries. If no actionable opportunity exists, return only 'No actionable reuse opportunity found.' When paired with a handoff-producing skill, create handoffs only for actionable findings; create zero files and return NO_HANDOFFS_CREATED when none exist. Verify recommended external candidates through current official sources for maintenance health, compatibility, licensing at a useful summary level, and normal package-manager availability. Do not modify product code, dependencies, manifests, lock files, configuration, or Git state."