interface:
  display_name: "Reuse Before Build"
  short_description: "Review custom mechanisms for established reuse options"
  default_prompt: "Use $reuse-before-build-softskill as a technology-independent, source-first review. Inspect the repository for custom mechanisms that may duplicate existing repository, standard-library, platform, framework, current-dependency, or established ecosystem solutions. When external alternatives may matter, research current official sources, verify maintenance health, compatibility, licensing at a useful summary level, and normal package-manager availability. Prefer recognized, maintained solutions over obscure or outdated projects, but keep or reduce a local implementation when that is more proportionate. Return concrete findings in chat only. Do not modify files, dependencies, manifests, lock files, configuration, Git state, or repository-local reports."
