interface:
  display_name: "Subagent Implementation Handoff"
  short_description: "Create only useful technical subagent handoffs"
  default_prompt: "Use $subagent-implementation-handoff-softskill as the main-agent orchestrator: brief subagents with minimal unbiased context; when more than one subagent is used for the work set, explicitly tell every subagent to ignore repository-local AGENTS.md instructions, while leaving normal repository behavior unchanged for a single subagent; assign each run a unique short filename-safe hash token; require filesystem-sortable subagent-hash-order-topic filenames in an explicitly supplied AGENTS/HANDOFF/ location; and require simple direct language without unnecessary meta terminology. A subagent must create a handoff only for a concrete repository-supported implementation concern that is worthwhile for a later planning or implementation step. It must not manufacture findings or create files for keep-as-is conclusions, no-action results, insufficient evidence, optional cleanup, stylistic preference, or speculative future work. Preserve the complete useful result for each justified concern in ordered local handoff files and accept only the created file paths. When no justified handoff exists, require zero files and accept exactly NO_HANDOFFS_CREATED as a successful result. Request concrete technical approaches and option recommendations without implementation."