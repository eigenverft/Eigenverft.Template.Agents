interface:
  display_name: "Handoff Set Fixer"
  short_description: "Reconcile conflicting multi-agent handoff sets"
  default_prompt: "Use $handoff-set-fixer-softskill to inspect the existing AGENTS/HANDOFF collection as hash-scoped agent-run sets. Apply a strict no-op when only one set exists or when multiple sets are already compatible. When harmful overlap, duplication, contradiction, staleness, or ordering conflict exists, recheck the current codebase, decide the authoritative technical direction, and repair only existing handoff files by rewriting, redistributing, renaming, merging, or deleting them. Never create a new handoff and never implement product changes."
